services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: voteoff
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: node:20-alpine
    working_dir: /app
    # Install deps, generate Prisma client, sync schema, seed (ignored if data exists), start dev server
    command: sh -c "npm install && npx prisma generate && npx prisma db push && (npm run db:seed || true) && npm run dev"
    volumes:
      - ./backend:/app
      - backend_modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/voteoff
      JWT_SECRET: dev-secret-change-in-production
      PORT: 3000
      # Required for file watching inside Docker on macOS
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  prisma-studio:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npx prisma studio --port 5555 --browser none"
    volumes:
      - ./backend:/app
      - backend_modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/voteoff
    ports:
      - "5555:5555"
    depends_on:
      - backend

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    environment:
      # Points Vite's proxy at the backend container instead of localhost
      BACKEND_URL: http://backend:3000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_modules:
  frontend_modules:
